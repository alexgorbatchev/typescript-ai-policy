name: Release npm Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Derive release version from tag
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$release_version" || "$release_version" == "$GITHUB_REF_NAME" ]]; then
            echo "Expected a tag like v1.2.3, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Validate package version matches the release tag
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$RELEASE_VERSION" ]]; then
            echo "package.json version ($package_version) must match release tag version ($RELEASE_VERSION)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package
        env:
          CI: "false"
        run: |
          bun run check
          npm pack --dry-run

      - name: Publish package
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release already exists for $GITHUB_REF_NAME; skipping creation."
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --latest
